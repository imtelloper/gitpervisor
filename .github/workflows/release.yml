name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.0.0-dev"

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # OS별 안정 번들 포맷만 선택 (msi=WiX·dmg는 CI에서 불안정)
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles dmg --verbose"
          - platform: ubuntu-22.04
            args: "--bundles deb rpm appimage"
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # tauri-action reads GITHUB_TOKEN from env (below), not git creds,
          # so keep the contents:write token out of .git/config for later steps.
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Ubuntu system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Monaco 번들링이 기본 Node 힙(~2GB)을 넘겨 OOM → 힙 상향
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "Gitpervisor ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          # 자동 공개: draft면 /releases/latest API가 404 → 웹사이트 다운로드 버튼이
          # 릴리스 목록 페이지로 폴백된다. 태그 푸시만으로 설치 파일이 링크되도록 공개.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
